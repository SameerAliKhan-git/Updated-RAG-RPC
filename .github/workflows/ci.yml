# ═══════════════════════════════════════════════════════════
# Corpus — CI Pipeline
# Runs on push/PR to main: lint, format check, type check, unit tests.
# ═══════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: MyPy type check
        run: uv run mypy src/ --ignore-missing-imports

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Run golden evaluation gate tests
        run: uv run pytest tests/eval/ -v --tb=short

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: rag_password
          POSTGRES_DB: corpus_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      opensearch:
        image: opensearchproject/opensearch:2.19.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests (Ollama-dependent tests auto-skip)
        env:
          POSTGRES_DATABASE_URL: postgresql+psycopg2://rag_user:rag_password@localhost:5432/corpus_db
          OPENSEARCH__HOST: http://localhost:9200
          REDIS__HOST: localhost
        run: uv run pytest tests/integration/ -v --tb=short -m "not requires_ollama"
