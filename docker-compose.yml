# ═══════════════════════════════════════════════════════════
# Corpus — Docker Compose (Development)
# Brings up the full stack locally for development.
# ═══════════════════════════════════════════════════════════

services:
  # ── Core Application ───────────────────────────────────
  api:
    build: .
    container_name: corpus-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\"" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s  # first boot downloads the embedding model (~2.2GB) into hf_cache
    env_file:
      - .env
    environment:
      - OPENSEARCH__HOST=http://opensearch:9200
      - OLLAMA_HOST=${OLLAMA_HOST}
      - POSTGRES_DATABASE_URL=postgresql+psycopg2://rag_user:rag_password@postgres:5432/corpus_db
      - LANGFUSE_HOST=http://langfuse-web:3000
      - REDIS__HOST=redis
    volumes:
      - ./src:/app/src
      - ./static:/app/static
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    networks:
      - corpus-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Data Stores ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: corpus-postgres
    environment:
      - POSTGRES_DB=corpus_db
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=rag_password
      - POSTGRES_HOST_AUTH_METHOD=password
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rag_user -d corpus_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - corpus-network

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: corpus-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
      - "9600:9600"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - corpus-network

  opensearch-dashboards:
    profiles: ["observability"]
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: corpus-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - corpus-network

  redis:
    image: redis:7-alpine
    container_name: corpus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - corpus-network

#  ollama:
#    image: ollama/ollama:0.11.2
#    container_name: corpus-ollama
#    # ports:
#    #   - "11434:11434"
#    volumes:
#      - ollama_data:/root/.ollama
#    healthcheck:
#      test: [ "CMD", "ollama", "list" ]
#      interval: 30s
#      timeout: 10s
#      retries: 3
#      start_period: 30s
#    restart: unless-stopped
#    networks:
#      - corpus-network

  # ── Ingestion Orchestration ────────────────────────────
  airflow:
    profiles: ["airflow"]
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: corpus-airflow
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - PYTHONPATH=/opt/airflow/src
      - POSTGRES_DATABASE_URL=postgresql+psycopg2://rag_user:rag_password@postgres:5432/corpus_db
      - OPENSEARCH__HOST=http://opensearch:9200
      - OLLAMA_HOST=${OLLAMA_HOST}
      - REDIS__HOST=redis
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8080/api/v2/monitor/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    networks:
      - corpus-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Observability: Langfuse ────────────────────────────
  clickhouse:
    profiles: ["observability"]
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: corpus-clickhouse
    environment:
      - CLICKHOUSE_DB=langfuse
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=langfuse
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: [ "CMD", "clickhouse-client", "--query", "SELECT 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - corpus-network

  langfuse-web:
    profiles: ["observability"]
    image: docker.io/langfuse/langfuse:3
    container_name: corpus-langfuse-web
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: "${LANGFUSE_NEXTAUTH_SECRET}"
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      SALT: "${LANGFUSE_SALT}"
      ENCRYPTION_KEY: "${LANGFUSE_ENCRYPTION_KEY}"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_USE_AZURE_BLOB: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: "${LANGFUSE_MINIO_ACCESS_KEY}"
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "${LANGFUSE_MINIO_SECRET_KEY}"
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: "${LANGFUSE_MINIO_ACCESS_KEY}"
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: "${LANGFUSE_MINIO_SECRET_KEY}"
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:9090
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: "${LANGFUSE_REDIS_PASSWORD}"
      REDIS_TLS_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: "corpus-org"
      LANGFUSE_INIT_ORG_NAME: "Corpus Organization"
      LANGFUSE_INIT_PROJECT_NAME: "Corpus Agentic RAG"
      LANGFUSE_INIT_USER_EMAIL: "admin@example.com"
      LANGFUSE_INIT_USER_NAME: "Admin"
      LANGFUSE_INIT_USER_PASSWORD: "admin123"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://langfuse-web:3000/api/public/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - corpus-network

  langfuse-worker:
    profiles: ["observability"]
    image: docker.io/langfuse/langfuse-worker:3
    container_name: corpus-langfuse-worker
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "3030:3030"
    environment:
      NEXTAUTH_URL: http://localhost:3001
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      SALT: "${LANGFUSE_SALT}"
      ENCRYPTION_KEY: "${LANGFUSE_ENCRYPTION_KEY}"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_USE_AZURE_BLOB: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: "${LANGFUSE_MINIO_ACCESS_KEY}"
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "${LANGFUSE_MINIO_SECRET_KEY}"
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: "${LANGFUSE_MINIO_ACCESS_KEY}"
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: "${LANGFUSE_MINIO_SECRET_KEY}"
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:9090
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: "${LANGFUSE_REDIS_PASSWORD}"
      REDIS_TLS_ENABLED: "false"
    networks:
      - corpus-network

  langfuse-postgres:
    profiles: ["observability"]
    image: postgres:17
    container_name: corpus-langfuse-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
      - POSTGRES_HOST_AUTH_METHOD=password
      - TZ=UTC
      - PGTZ=UTC
    ports:
      - "5433:5432"
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U langfuse -d langfuse" ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - corpus-network

  langfuse-redis:
    profiles: ["observability"]
    image: docker.io/redis:7
    container_name: corpus-langfuse-redis
    restart: unless-stopped
    command: --requirepass langfuse_redis_password
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "langfuse_redis_password", "ping" ]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - corpus-network

  langfuse-minio:
    profiles: ["observability"]
    image: docker.io/minio/minio
    container_name: corpus-langfuse-minio
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      - MINIO_ROOT_USER=langfuse_minio
      - MINIO_ROOT_PASSWORD=langfuse_minio_secret
    ports:
      - "9090:9000"
      - "9091:9001"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - corpus-network

  frontend:
    build:
      context: ./frontend
    container_name: corpus-frontend
    ports:
      - "7860:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - corpus-network
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    container_name: corpus-backup
    environment:
      - PGPASSWORD=rag_password
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "while true; do
        ts=$$(date +%Y%m%d_%H%M);
        pg_dump -h postgres -U rag_user -Fc corpus_db > /backups/corpus_$$ts.dump 2>/backups/last_error.log
          && echo \"backup ok: corpus_$$ts.dump\"
          || echo \"backup FAILED at $$ts\";
        ls -1t /backups/corpus_*.dump 2>/dev/null | tail -n +15 | xargs -r rm --;
        sleep 86400;
      done"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - corpus-network
    restart: unless-stopped

  arq-worker:
    build: .
    container_name: corpus-arq-worker
    command: arq src.services.arq_worker.WorkerSettings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - OPENSEARCH__HOST=http://opensearch:9200
      - OLLAMA_HOST=${OLLAMA_HOST}
      - POSTGRES_DATABASE_URL=postgresql+psycopg2://rag_user:rag_password@postgres:5432/corpus_db
      - REDIS__HOST=redis
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    networks:
      - corpus-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.51.0
    container_name: corpus-prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9092:9090"
    networks:
      - corpus-network
    restart: unless-stopped

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:10.4.1
    container_name: corpus-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3002:3000"
    networks:
      - corpus-network
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────────────
volumes:
  postgres_data:
  opensearch_data:
  ollama_data:
  redis_data:
  hf_cache:
  airflow_logs:
  clickhouse_data:
  langfuse_postgres_data:
  langfuse_minio_data:
  prometheus_data:
  grafana_data:

    # ── Network ──────────────────────────────────────────────
networks:
  corpus-network:
    driver: bridge
